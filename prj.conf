# Logging
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_USBD_LOG_LEVEL_INF=y
CONFIG_UDC_DRIVER_LOG_LEVEL_INF=y

# Board peripherals
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_REBOOT=y
CONFIG_CAN=y
CONFIG_CAN_MCP2515=y
CONFIG_CAN_DEFAULT_BITRATE=500000
CONFIG_JSON_LIBRARY=y

# USB device stack next
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_USBD_CDC_NCM_LOG_LEVEL_INF=y

# Networking over USB CDC-NCM
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV4_AUTO=y
CONFIG_NET_ARP=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_NATIVE=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_CONFIG_SETTINGS=n
CONFIG_NET_DHCPV4=n
CONFIG_NET_SOCKETS=y

# mDNS / DNS-SD
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME_UNIQUE=n
CONFIG_NET_HOSTNAME="pico-can-bridge"
CONFIG_MDNS_RESPONDER=y
CONFIG_DNS_SD=y
CONFIG_MDNS_RESPONDER_DNS_SD=y
CONFIG_NET_IF_MCAST_IPV4_ADDR_COUNT=3

# Keep packet pools explicit for the RP2040's RAM budget.
CONFIG_ZVFS_POLL_MAX=9
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20
CONFIG_NET_CONTEXT_NET_PKT_POOL=y
CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
